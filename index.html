<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equilibria Practice Hub</title>

<style>
:root { 
    --primary: #2c3e50; 
    --accent: #27ae60; 
    --error: #c0392b; 
    --bg: #f4f7f6; 
    --sidebar-w: 260px; 
}

body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--bg); 
    margin: 0; 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

/* Sidebar */
#sidebar { 
    width: var(--sidebar-w); 
    background: var(--primary); 
    color: white; 
    display: flex; 
    flex-direction: column; 
    padding: 20px; 
}

#sidebar h2 { 
    text-align: center; 
    margin-bottom: 20px; 
}

.nav-btn { 
    background: none; 
    border: 1px solid #455a64; 
    color: white; 
    padding: 12px; 
    margin-bottom: 8px; 
    border-radius: 5px; 
    cursor: pointer; 
}

.nav-btn:hover { background: #34495e; }
.nav-btn.active { background: var(--accent); }

.ref-group { 
    margin-top: auto; 
    border-top: 1px solid #455a64; 
    padding-top: 20px; 
}

.ref-btn { background: #7f8c8d; }

/* Main */
#main-content { 
    flex-grow: 1; 
    padding: 40px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
}

.card { 
    background: white; 
    padding: 30px; 
    border-radius: 15px; 
    width: 100%; 
    max-width: 700px; 
}

/* Problem container */
#problem-area {
    font-size: 1.2rem;
    line-height: 1.6;
    margin-top: 20px;
}

/* Overlay tools */
.overlay { 
    display: none; 
    position: fixed; 
    top: 10%; 
    left: 300px; 
    right: 50px; 
    bottom: 10%; 
    background: white; 
    border-radius: 10px; 
    z-index: 100; 
    padding: 20px; 
}

.overlay-header {
    display: flex;
    justify-content: space-between;
}

.close-btn {
    background: var(--error);
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
    <h2>Equilibria</h2>

    <button class="nav-btn active" onclick="loadTopic('general', event)">
        General Equilibrium (Kc, Kp)
    </button>

    <button class="nav-btn" onclick="loadTopic('acidbase', event)">
        Acid / Base (Ka, Kb, Kw)
    </button>

    <button class="nav-btn" onclick="loadTopic('solubility', event)">
        Solubility (Ksp)
    </button>

    <div class="ref-group">
        <button class="nav-btn ref-btn" onclick="toggleRef('calc')">Calculator</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('ptable')">Periodic Table</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('eqn')">Equation Sheet</button>
    </div>
</div>

<!-- Main Content -->
<div id="main-content">
    <div class="card">
        <h1 id="topic-title">General Equilibrium</h1>

        <div id="problem-area">
            Select a topic to begin practicing equilibrium problems.
            <button onclick="generateProblem()">New Problem</button>
        </div>
    </div>
</div>

<!-- Overlays -->
<div id="calc" class="overlay">
    <div class="overlay-header">
        <h3>Calculator</h3>
        <button class="close-btn" onclick="toggleRef('calc')">X</button>
    </div>
    <iframe src="https://www.desmos.com/scientific" width="100%" height="90%"></iframe>
</div>

<div id="ptable" class="overlay">
    <div class="overlay-header">
        <h3>Periodic Table</h3>
        <button class="close-btn" onclick="toggleRef('ptable')">X</button>
    </div>
    <iframe src="https://ptable.com" width="100%" height="90%"></iframe>
</div>

<div id="eqn" class="overlay">
    <div class="overlay-header">
        <h3>Equation Sheet</h3>
        <button class="close-btn" onclick="toggleRef('eqn')">X</button>
    </div>
    <object data="Equation_Sheet2.pdf" width="100%" height="90%"></object>
</div>

<script>
<!-- Script -->
// ====== GLOBAL ======
let currentProblem = null;

// Load General Equilibrium automatically
window.onload = () => generateProblem();

// ====== MAIN GENERATOR ======
function generateProblem() {
    const types = ["K_from_data", "equilibrium_conc", "Q_direction"];
    const type = types[Math.floor(Math.random() * types.length)];

    if (type === "K_from_data") currentProblem = genKProblem();
    if (type === "equilibrium_conc") currentProblem = genEquilibriumConc();
    if (type === "Q_direction") currentProblem = genQProblem();

    displayProblem();
}

// ====== DISPLAY ======
function displayProblem() {
    document.getElementById("problem-area").innerHTML = `
        <div><strong>Reaction:</strong><br>${currentProblem.equation}</div><br>
        <div><strong>Given:</strong><br>${currentProblem.given}</div><br>
        <div><strong>Question:</strong><br>${currentProblem.question}</div><br>
        <button onclick="showAnswer()">Show Answer & Explanation</button>
        <div id="answer-box" style="margin-top:20px; display:none;"></div>
    `;

    if (window.MathJax) MathJax.typeset();
}

// ====== SHOW ANSWER ======
function showAnswer() {
    const box = document.getElementById("answer-box");
    box.style.display = "block";
    box.innerHTML = `
        <strong>Answer:</strong><br>${currentProblem.answer}<br><br>
        <strong>Explanation:</strong><br>${currentProblem.explanation}
    `;
    MathJax.typeset();
}

// =====================================================
// =============== PROBLEM GENERATORS ===================
// =====================================================

// ---------- TYPE 1: FIND K ----------
function genKProblem() {
    let a = 1, b = 1, c = 1;

    let initA = rand(1.0, 2.0);
    let initB = rand(1.0, 2.0);
    let change = rand(0.2, 0.8);

    let eqA = (initA - change).toFixed(2);
    let eqB = (initB - change).toFixed(2);
    let eqC = (change).toFixed(2);

    let K = ((eqC) / (eqA * eqB)).toFixed(3);

    return {
        equation: `$$A(g) + B(g) \\rightleftharpoons C(g)$$`,
        given: `
            Initial: [A] = ${initA} M, [B] = ${initB} M<br>
            At equilibrium: [C] = ${eqC} M
        `,
        question: `Calculate the value of $K_c$.`,
        answer: `$K_c = ${K}$`,
        explanation: `
            ICE Table:<br>
            I: ${initA}, ${initB}, 0<br>
            C: -x, -x, +x<br>
            E: ${eqA}, ${eqB}, ${eqC}<br><br>

            $K_c = \\frac{[C]}{[A][B]} = \\frac{${eqC}}{(${eqA})(${eqB})} = ${K}$
        `
    };
}

// ---------- TYPE 2: FIND EQUILIBRIUM ----------
function genEquilibriumConc() {
    let initA = rand(1.0, 2.0);
    let initB = rand(1.0, 2.0);
    let K = rand(2, 10);

    let x = 0.5; // controlled (no quadratic)
    let eqA = (initA - x).toFixed(2);
    let eqB = (initB - x).toFixed(2);
    let eqC = (x).toFixed(2);

    return {
        equation: `$$A(g) + B(g) \\rightleftharpoons C(g)$$`,
        given: `
            $K_c = ${K}$<br>
            Initial: [A] = ${initA}, [B] = ${initB}
        `,
        question: `Determine equilibrium concentrations (assume simple change).`,
        answer: `
            [A] = ${eqA} M<br>
            [B] = ${eqB} M<br>
            [C] = ${eqC} M
        `,
        explanation: `
            ICE Table:<br>
            I: ${initA}, ${initB}, 0<br>
            C: -x, -x, +x<br>
            E: ${eqA}, ${eqB}, ${eqC}<br><br>

            Values chosen to avoid quadratic solving.
        `
    };
}

// ---------- TYPE 3: Q vs K ----------
function genQProblem() {
    let A = rand(0.5, 2.0);
    let B = rand(0.5, 2.0);
    let C = rand(0.1, 1.0);

    let K = rand(0.5, 2.0);
    let Q = (C / (A * B)).toFixed(2);

    let direction = "";

    if (Q > K) direction = "shift left (toward reactants)";
    else if (Q < K) direction = "shift right (toward products)";
    else direction = "at equilibrium";

    return {
        equation: `$$A(g) + B(g) \\rightleftharpoons C(g)$$`,
        given: `
            [A] = ${A}, [B] = ${B}, [C] = ${C}<br>
            $K_c = ${K}$
        `,
        question: `Calculate Q and determine direction of shift.`,
        answer: `
            $Q = ${Q}$<br>
            System will ${direction}
        `,
        explanation: `
            $Q = \\frac{[C]}{[A][B]} = \\frac{${C}}{(${A})(${B})} = ${Q}$<br><br>

            Compare Q to K:<br>
            ${Q} ${Q > K ? ">" : "<"} ${K}<br><br>

            Therefore, system will ${direction}.
        `
    };
}

// ====== RANDOM NUMBER HELPER ======
function rand(min, max) {
    return (Math.random() * (max - min) + min).toFixed(2);
}
</script>
</body>
</html>
